kind = "web"
previewPath = "/"
title = "Book Quiz Lab"
version = "1.0.0"
id = "artifacts/book-quiz-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19157

[services.development]
run = "pnpm --filter @workspace/book-quiz-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/book-quiz-lab", "run", "build" ]
publicDir = "artifacts/book-quiz-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19157"
BASE_PATH = "/"
